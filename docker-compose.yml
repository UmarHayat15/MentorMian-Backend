version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aitutor-postgres
    environment:
      POSTGRES_DB: aitutor
      POSTGRES_USER: aitutor
      POSTGRES_PASSWORD: aitutor_secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitutor"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    container_name: aitutor-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama

volumes:
  pgdata:
  ollama_data:
