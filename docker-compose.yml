version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: aitutor-postgres
    environment:
      POSTGRES_DB: ${AITUTOR_DB_NAME:-aitutor}
      POSTGRES_USER: ${AITUTOR_DB_USER:-aitutor}
      POSTGRES_PASSWORD: ${AITUTOR_DB_PASSWORD:-aitutor_secret}
    ports:
      - "${AITUTOR_DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${AITUTOR_DB_USER:-aitutor}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ollama:
  #   image: ollama/ollama:latest
