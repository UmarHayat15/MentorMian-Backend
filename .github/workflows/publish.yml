name: Build & Publish

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  # ------------------------------------------------------------------
  # 1. Build & Test
  # ------------------------------------------------------------------
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: aitutor
          POSTGRES_USER: aitutor
          POSTGRES_PASSWORD: aitutor_secret
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U aitutor"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      AITUTOR_DB_URL: jdbc:postgresql://localhost:5432/aitutor
      AITUTOR_DB_USER: aitutor
      AITUTOR_DB_PASSWORD: aitutor_secret
      AITUTOR_DB_DRIVER: org.postgresql.Driver
      AITUTOR_DB_MAX_POOL_SIZE: 10
      AITUTOR_UPLOADS_DIR: uploads
      AITUTOR_OLLAMA_BASE_URL: http://localhost:11434
      AITUTOR_CHUNKING_MAX_TOKENS: 512
      AITUTOR_CHUNKING_OVERLAP_PERCENT: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & Run Tests
        run: ./gradlew build --no-daemon

      - name: Upload fat JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: fat-jar
          path: build/libs/*-all.jar
          retention-days: 5

  # ------------------------------------------------------------------
  # 2. Publish JAR to GitHub Packages (Maven)
  # ------------------------------------------------------------------
  publish-jar:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Compute package version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "value=0.1.0-SNAPSHOT.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish JAR to GitHub Packages
        run: ./gradlew publish -PpackageVersion=${{ steps.version.outputs.value }} --no-daemon
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ------------------------------------------------------------------
  # 3. Build & Push Docker Image to ghcr.io
  # ------------------------------------------------------------------
  publish-docker:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
